mcsa_daily:
  cron: "0 6 * * *"
  # Use package entrypoint and correct job name
  cmd: "python -m tayfin_screener_jobs jobs run mcsa_screen nasdaq-100"

indicators_hourly:
  cron: "0 * * * *"
  cmd: "python -m tayfin_indicator_jobs jobs run vol_sma all"

ohlcv_daily:
  cron: "0 5 * * *"
  cmd: "python -m tayfin_ingestor_jobs jobs run ohlcv all"
