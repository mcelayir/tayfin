services:
  # ── Data tier ──────────────────────────────────────────────
  db:
    image: timescale/timescaledb-ha:pg16
    container_name: tayfin_db_dev
    environment:
      # Provide safe defaults for local development when .env is missing.
      # Note: Postgres requires a non-empty superuser password at container init.
      POSTGRES_DB: ${POSTGRES_DB:-tayfin}
      POSTGRES_USER: ${POSTGRES_USER:-tayfin_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tayfin_password}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}", "-d", "${POSTGRES_DB}"]
      interval: 3s
      timeout: 3s
      retries: 20
    volumes:
      - pgdata_dev:/var/lib/postgresql/data

  flyway:
    image: flyway/flyway:12
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tayfin}
      POSTGRES_USER: ${POSTGRES_USER:-tayfin_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tayfin_password}
    volumes:
      - ../tayfin-ingestor/db/migrations:/flyway/sql/tayfin-ingestor:ro
      - ../tayfin-screener/db/migrations:/flyway/sql/tayfin-screener:ro
      - ../tayfin-analyzer/db/migrations:/flyway/sql/tayfin-analyzer:ro
      - ../tayfin-indicator/db/migrations:/flyway/sql/tayfin-indicator:ro
      - ./flyway-run.sh:/flyway-run.sh:ro
    entrypoint: ["/bin/bash"]
    command: ["/flyway-run.sh"]

  # ── Python APIs (ADR-03 § Flask dev server) ────────────────
  ingestor-api:
    build:
      context: ../tayfin-ingestor/tayfin-ingestor-api
    ports:
      - "8000:8000"
    env_file: ../.env
    environment:
      POSTGRES_HOST: db
    depends_on:
      flyway:
        condition: service_completed_successfully

  indicator-api:
    build:
      context: ../tayfin-indicator/tayfin-indicator-api
    ports:
      - "8010:8010"
    env_file: ../.env
    environment:
      POSTGRES_HOST: db
      TAYFIN_INGESTOR_API_BASE_URL: http://ingestor-api:8000
    depends_on:
      flyway:
        condition: service_completed_successfully
      ingestor-api:
        condition: service_healthy

  screener-api:
    build:
      context: ../tayfin-screener/tayfin-screener-api
    ports:
      - "8020:8020"
    env_file: ../.env
    environment:
      POSTGRES_HOST: db
    depends_on:
      flyway:
        condition: service_completed_successfully

  # ── BFF + UI (ADR-03 § Vite HMR) ──────────────────────────
  bff:
    build:
      context: ../tayfin-app/tayfin-bff
    ports:
      - "8030:8030"
    environment:
      TAYFIN_SCREENER_API_BASE_URL: http://screener-api:8020
    depends_on:
      screener-api:
        condition: service_healthy
    # Mount source for local development so code edits appear without rebuild
    volumes:
      - ../tayfin-app/tayfin-bff/src:/app/src:cached
      - ../tayfin-app/tayfin-bff/config:/app/config:cached
      - ../tayfin-app/tayfin-bff/requirements.txt:/app/requirements.txt:ro

  ui:
    build:
      context: ../tayfin-app/tayfin-ui
    ports:
      - "5173:5173"
    environment:
      VITE_API_TARGET: http://bff:8030
    depends_on:
      bff:
        condition: service_healthy
    # Mount UI source for HMR during local development
    volumes:
      - ../tayfin-app/tayfin-ui:/app:cached
    # Ensure dev server runs with host binding (Dockerfile CMD already does this)

  scheduler:
    build:
      context: .
      dockerfile: scheduler/Dockerfile
    environment:
      POSTGRES_HOST: db
      # Toggle: set SCHEDULER_ENABLED=1 to enable scheduled runs in dev
      SCHEDULER_ENABLED: "0"
      PYTHONPATH: "/repo/tayfin-screener/tayfin-screener-jobs/src:/repo/tayfin-indicator/tayfin-indicator-jobs/src:/repo/tayfin-ingestor/tayfin-ingestor-jobs/src"
    depends_on:
      flyway:
        condition: service_completed_successfully
      db:
        condition: service_healthy
    volumes:
      - ..:/repo:cached
    # Default: run all schedules once and exit. For continuous scheduler remove --once.
    command: ["--once"]
    healthcheck:
      test: ["CMD", "test", "-f", "/app/schedules.yml"]
      interval: 5s
      timeout: 2s
      retries: 3

volumes:
  pgdata_dev:
