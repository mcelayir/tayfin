name: CI (with dev installs)

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  test-with-dev-installs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Prepare PYTHONPATH and run tests
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pyyaml || true
          if [ -f infra/requirements.txt ]; then pip install -r infra/requirements.txt; fi
          # Add package src dirs to PYTHONPATH so tests can import local packages
          export PYTHONPATH="$(pwd)/tayfin-ingestor/tayfin-ingestor-jobs/src:$(pwd)/tayfin-ingestor/tayfin-ingestor-api/src:$(pwd)/tayfin-indicator/tayfin-indicator-jobs/src:$(pwd)/tayfin-indicator/tayfin-indicator-api/src:$(pwd)/tayfin-screener/tayfin-screener-jobs/src:$(pwd)/tayfin-screener/tayfin-screener-api/src:$(pwd)/tayfin-analyzer/tayfin-analyzer-api/src:$(pwd)/tayfin-app/tayfin-bff/src"
          echo "PYTHONPATH=$PYTHONPATH"
          find . -name "__pycache__" -type d -exec rm -rf {} + || true
          # Run unit/job-scoped tests only (exclude API/integration tests)
          pytest infra/tests -q
          pytest tayfin-ingestor/tayfin-ingestor-jobs/tests -q
          pytest tayfin-indicator/tayfin-indicator-jobs/tests -q
          pytest tayfin-screener/tayfin-screener-jobs/tests -q
          pytest tayfin-app/tayfin-bff/tests -q || true
  integration:
    runs-on: ubuntu-latest
    needs: test-with-dev-installs
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: tayfin_user
          POSTGRES_PASSWORD: tayfin_password
          POSTGRES_DB: tayfin
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U tayfin_user -d tayfin"
          --health-interval 5s --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Wait for Postgres
        run: |
          echo "Waiting for Postgres service..."
          sleep 10
      - name: Run Flyway migrations
        run: |
          chmod +x infra/flyway-run.sh || true
          ./infra/flyway-run.sh
      - name: Prepare PYTHONPATH and run integration tests
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pyyaml || true
          if [ -f infra/requirements.txt ]; then pip install -r infra/requirements.txt; fi
          export PYTHONPATH="$(pwd)/tayfin-ingestor/tayfin-ingestor-jobs/src:$(pwd)/tayfin-ingestor/tayfin-ingestor-api/src:$(pwd)/tayfin-indicator/tayfin-indicator-jobs/src:$(pwd)/tayfin-indicator/tayfin-indicator-api/src:$(pwd)/tayfin-screener/tayfin-screener-jobs/src:$(pwd)/tayfin-screener/tayfin-screener-api/src:$(pwd)/tayfin-analyzer/tayfin-analyzer-api/src:$(pwd)/tayfin-app/tayfin-bff/src"
          echo "PYTHONPATH=$PYTHONPATH"
          find . -name "__pycache__" -type d -exec rm -rf {} + || true
          # Run API/integration tests against the Postgres service
          pytest tayfin-ingestor/tayfin-ingestor-api/tests -q
          pytest tayfin-indicator/tayfin-indicator-api/tests -q
          pytest tayfin-screener/tayfin-screener-api/tests -q
          pytest tayfin-analyzer/tayfin-analyzer-api/tests -q || true
