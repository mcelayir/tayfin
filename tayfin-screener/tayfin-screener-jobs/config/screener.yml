# tayfin-screener-jobs configuration
# Structure: jobs.<job_name>.targets.<target_name>

jobs:
  vcp_screen:
    targets:
      nasdaq-100:
        index_code: NDX
        country: US
        lookback_days: 365
        indicators:
          - key: sma
            window: 50
          - key: sma
            window: 150
          - key: sma
            window: 200
          - key: atr
            window: 20
          - key: vol_sma
            window: 50
          - key: rolling_high
            window: 252

  mcsa_screen:
    targets:
      nasdaq-100:
        index_code: NDX
        country: US

        # MCSA algorithm configuration (ADR-01)
        mcsa:
          weights:
            trend: 30
            vcp: 35
            volume: 15
            fundamentals: 20

          trend:
            price_above_sma50:
              points: 8
            sma50_above_sma150:
              points: 8
            sma150_above_sma200:
              points: 8
            near_52w_high:
              points: 6
              max_distance_pct: 0.15

          vcp:
            no_pattern_cap: 15

          volume:
            sma_window: 50
            lookback_days: 20
            pullback_below_sma:
              points: 5
            dryup:
              points: 5
              threshold_pct: 0.5
            no_heavy_selling:
              points: 5
              heavy_selling_threshold_pct: 1.5

          fundamentals:
            revenue_growth:
              min_pct: 0.15
              points: 5
            earnings_growth:
              min_pct: 0.15
              points: 5
            roe:
              min_pct: 0.15
              points: 4
            net_margin:
              min_pct: 0.05
              points: 3
            debt_equity:
              max_value: 1.0
              points: 3

          bands:
            strong_min: 85
            watchlist_min: 70
            neutral_min: 50

          lookbacks:
            trend_days: 7
            volume_days: 7
            vcp_days: 7
            fundamentals_days: 90

          missing_data:
            mode: partial
